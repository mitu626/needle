<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="80" rx="12" fill="#0f172a"/>

  <!-- Needle icon, centered at (38, 40), tilted -20deg -->
  <g transform="translate(38,40) rotate(-20)" filter="url(#glow)">
    <!-- Outer needle shape: tip at bottom (0,28), blunt rounded top -->
    <path d="M0,28 C2,26 3.5,18 3.5,2 L3.5,-20 A3.5,5 0 0,0 -3.5,-20 L-3.5,2 C-3.5,18 -2,26 0,28 Z"
          fill="url(#needleGrad)"/>
    <!-- Eye hole -->
    <ellipse cx="0" cy="-14" rx="2.2" ry="3.8" fill="#0f172a"/>
    <!-- Highlight -->
    <line x1="1.3" y1="22" x2="1.3" y2="-11" stroke="white" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- Vertical divider -->
  <line x1="68" y1="18" x2="68" y2="62" stroke="#1e293b" stroke-width="1.5"/>

  <!-- "needle" wordmark -->
  <text x="82" y="47"
        font-family="ui-monospace,'SF Mono','Fira Code','Cascadia Code',monospace"
        font-size="28" font-weight="700" letter-spacing="-0.5"
        fill="white">needle</text>

  <!-- Subtitle -->
  <text x="83" y="63"
        font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="400" letter-spacing="2.5"
        fill="#475569">LLM INFERENCE ENGINE</text>
</svg>
